<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTECH ERP — Login</title>
<link rel="icon" type="image/png" href="optech-green-dot copy 2.png">
<style>
:root {
  --g9:#1A4325; --g7:#2E7D32; --g4:#4CAF50; --g1:#D6F0E0;
  --red:#c62828;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;background:#f0f4f1}

/* ── LEFT PANEL ── */
.brand-panel {
  width: 45%;
  background: linear-gradient(160deg, #0b2414 0%, #1A4325 45%, #2E7D32 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 50px;
  position: relative;
  overflow: hidden;
  color: white;
}
.brand-panel::before {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  border: 60px solid rgba(76,175,80,.12);
  top: -100px; right: -100px;
}
.brand-panel::after {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  border: 40px solid rgba(76,175,80,.08);
  bottom: -80px; left: -80px;
}
.brand-logo {
  width: 100px; height: auto;
  margin-bottom: 28px;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 4px 20px rgba(76,175,80,.4));
}
.brand-name {
  font-size: 38px;
  font-weight: 800;
  letter-spacing: 4px;
  margin-bottom: 6px;
  position: relative;
  z-index: 1;
}
.brand-sub {
  font-size: 14px;
  color: rgba(255,255,255,.7);
  letter-spacing: 1px;
  margin-bottom: 50px;
  position: relative;
  z-index: 1;
}
.brand-features {
  list-style: none;
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 280px;
}
.brand-features li {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,.1);
  font-size: 14px;
  color: rgba(255,255,255,.85);
}
.brand-features li .icon {
  width: 32px; height: 32px;
  background: rgba(76,175,80,.2);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}

/* ── RIGHT PANEL ── */
.login-panel {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 60px;
  background: white;
}
.login-box {
  width: 100%;
  max-width: 400px;
}
.login-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--g9);
  margin-bottom: 6px;
}
.login-subtitle {
  font-size: 14px;
  color: #888;
  margin-bottom: 36px;
}
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: #555;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 7px;
}
.input-wrap {
  position: relative;
}
.input-wrap .input-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: #aaa;
}
.form-group input {
  width: 100%;
  border: 2px solid #e8e8e8;
  border-radius: 10px;
  padding: 13px 14px 13px 42px;
  font-size: 15px;
  outline: none;
  font-family: inherit;
  transition: .2s;
  background: #fafafa;
}
.form-group input:focus {
  border-color: var(--g4);
  background: #fff;
  box-shadow: 0 0 0 4px rgba(76,175,80,.1);
}
.eye-btn {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer; font-size: 17px; color: #aaa;
  padding: 4px;
}
.eye-btn:hover { color: #555; }

.login-btn {
  width: 100%;
  background: var(--g9);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: .2s;
  margin-top: 8px;
  letter-spacing: .5px;
}
.login-btn:hover { background: var(--g7); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(26,67,37,.25); }
.login-btn:active { transform: none; }

.error-box {
  background: #ffebee;
  border: 1px solid #ffcdd2;
  border-radius: 8px;
  padding: 11px 14px;
  font-size: 13px;
  color: var(--red);
  margin-bottom: 16px;
  display: none;
}
.error-box.show { display: block; }

.login-footer {
  text-align: center;
  margin-top: 28px;
  font-size: 12px;
  color: #bbb;
}

.loading-spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Connection status */
.conn-status {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  color: #888;
  margin-bottom: 24px;
  padding: 8px 12px;
  background: #f5f5f5;
  border-radius: 8px;
}
.conn-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #aaa;
}
.conn-dot.connected { background: var(--g4); }
.conn-dot.disconnected { background: var(--red); }

@media (max-width: 768px) {
  .brand-panel { display: none; }
  .login-panel { padding: 32px 24px; }
}
</style>
</head>
<body>

<!-- LEFT: Brand -->
<div class="brand-panel">
  <img src="optech-green-dot copy 2.png" class="brand-logo" alt="OPTECH Logo" onerror="this.style.display='none'">
  <div class="brand-name">OPTECH</div>
  <div class="brand-sub">IT Solutions ERP System</div>
  <ul class="brand-features">
    <li><span class="icon">📄</span> Invoices & Quotations</li>
    <li><span class="icon">💰</span> Cash Receipts</li>
    <li><span class="icon">🎯</span> CRM & Leads</li>
    <li><span class="icon">📦</span> Inventory Management</li>
    <li><span class="icon">👥</span> Customers & Suppliers</li>
    <li><span class="icon">📈</span> Reports & Analytics</li>
  </ul>
</div>

<!-- RIGHT: Login form -->
<div class="login-panel">
  <div class="login-box">
    <div class="login-title">Welcome back 👋</div>
    <div class="login-subtitle">Sign in to your OPTECH ERP account</div>

    <div class="conn-status" id="conn-status">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-label">Checking server connection…</span>
    </div>

    <div class="error-box" id="error-box"></div>

    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" id="username" placeholder="admin" autocomplete="username"
               onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
               onkeydown="if(event.key==='Enter')doLogin()">
        <button class="eye-btn" type="button" onmousedown="togglePwd()" onmouseup="togglePwd()" ontouchstart="togglePwd()" ontouchend="togglePwd()">👁</button>
      </div>
    </div>

    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>

    <div class="login-footer">OPTECH IT Solutions &nbsp;·&nbsp; Mokattam, Cairo</div>
  </div>
</div>

<script src="db-client.js"></script>
<script>
// ── Check if already logged in ─────────────────────────────────────────
async function checkSession() {
  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');

  if (!DbClient.IS_SERVER) {
    dot.className   = 'conn-dot disconnected';
    label.textContent = 'File mode — open via http://server-ip:3000 to share data';
    return;
  }

  const alive = await DbClient.ping();
  if (alive) {
    window.location.replace('index.html');
    return;
  }

  const ctrl = new AbortController();
  const to = setTimeout(() => ctrl.abort(), 3000);
  try {
    await fetch('/api/auth/ping', { cache:'no-store', signal: ctrl.signal });
    clearTimeout(to);
    dot.className   = 'conn-dot connected';
    label.textContent = 'Connected to server — enter your credentials';
  } catch {
    clearTimeout(to);
    dot.className   = 'conn-dot disconnected';
    label.textContent = 'Server offline — start with: node server.js';
  }
}

function togglePwd() {
  const el = document.getElementById('password');
  el.type = el.type === 'password' ? 'text' : 'password';
}

async function doLogin() {
  const btn  = document.getElementById('login-btn');
  const err  = document.getElementById('error-box');
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;

  if (!user || !pass) {
    showError('Please enter your username and password');
    return;
  }

  btn.innerHTML = '<span class="loading-spinner"></span>Signing in…';
  btn.disabled = true;
  err.classList.remove('show');

  if (!DbClient.IS_SERVER) {
    // Offline fallback — check against localStorage stored credentials
    const localUser = localStorage.getItem('optech_user_' + user);
    if (localUser) {
      const parsed = JSON.parse(localUser);
      if (parsed.password === pass) {
        sessionStorage.setItem('optech_token', 'local_' + Date.now());
        sessionStorage.setItem('optech_user', JSON.stringify(parsed));
        window.location.replace('index.html');
        return;
      }
    }
    showError('Invalid credentials (running in local file mode)');
    resetBtn(); return;
  }

  const result = await DbClient.login(user, pass);
  if (result.ok) {
    // Log login activity
    try {
      await fetch('/api/activities', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-auth-token': result.token },
        body: JSON.stringify({
          type: 'login',
          description: `User ${user} logged in successfully`,
          date: new Date().toISOString().slice(0,10),
          time: new Date().toTimeString().slice(0,5),
          user: user
        })
      });
    } catch(e) { /* ignore logging errors */ }
    window.location.replace('index.html');
  } else {
    showError(result.error || 'Invalid username or password');
    resetBtn();
  }
}

function showError(msg) {
  const err = document.getElementById('error-box');
  err.textContent = '⚠ ' + msg;
  err.classList.add('show');
}

function resetBtn() {
  const btn = document.getElementById('login-btn');
  btn.innerHTML = 'Sign In';
  btn.disabled  = false;
}

// Auto-fill demo hint
document.getElementById('username').value = '';

checkSession();
</script>
</body>
</html>
